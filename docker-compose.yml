services:
  postgres_db:
    image: postgres:16-alpine
    container_name: local_postgres
    environment:
      POSTGRES_USER: some_user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: documentdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local